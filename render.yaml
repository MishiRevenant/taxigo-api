services:
  - type: web
    name: taxigo-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false   # Set to your Supabase connection string in Render dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CORS_ORIGIN
        sync: false   # Set to your Vercel frontend URL, e.g. https://taxigo-web.vercel.app
      - key: API_URL
        sync: false   # Set to your Render service URL for Swagger servers list
