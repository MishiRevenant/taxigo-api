version: '3.9'

services:
  # ── PostgreSQL (local development database) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taxigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taxigo
      POSTGRES_PASSWORD: taxigo_dev_password
      POSTGRES_DB: taxigo
    ports:
      - '5432:5432'
    volumes:
      - taxigo-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taxigo']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── TaxiGo API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: taxigo-api:latest
    container_name: taxigo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://taxigo:taxigo_dev_password@postgres:5432/taxigo
      JWT_ACCESS_SECRET: change_this_in_production_access
      JWT_REFRESH_SECRET: change_this_in_production_refresh
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: http://localhost:5173
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  taxigo-pg-data:
    driver: local
